<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector | Professional Edition</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #8b5cf6;
            --fake-color: #ef4444;
            --fake-bg: rgba(239, 68, 68, 0.1);
            --real-color: #10b981;
            --real-bg: rgba(16, 185, 129, 0.1);
            --input-bg: rgba(15, 23, 42, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animated Mesh Gradient Background */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #0b0f19;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Main App Container */
        .app-container {
            width: 100%;
            max-width: 750px;
            padding: 2rem;
            box-sizing: border-box;
            z-index: 1;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Subtle top border glow for the card */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
            font-weight: 300;
        }

        /* Input Area */
        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-icon {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            pointer-events: none;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 1.2rem 1.2rem 1.2rem 3rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: var(--input-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        textarea::placeholder {
            color: #475569;
        }

        /* Button */
        button {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px -10px var(--primary-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--primary-glow);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        button i {
            transition: transform 0.3s ease;
        }

        button:hover i {
            transform: translateX(4px);
        }

        /* Result Area */
        .result-container {
            margin-top: 2rem;
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            padding: 1.5rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-family: 'Outfit', sans-serif;
        }

        .result-icon {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .result-text {
            display: flex;
            flex-direction: column;
        }

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
            opacity: 0.8;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* Result Modifiers */
        .result-box.real {
            background-color: var(--real-bg);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .result-box.real .result-icon {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--real-color);
        }
        .result-box.real .result-value {
            color: var(--real-color);
        }

        .result-box.fake {
            background-color: var(--fake-bg);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .result-box.fake .result-icon {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--fake-color);
        }
        .result-box.fake .result-value {
            color: var(--fake-color);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .glass-card {
                padding: 2rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Animation -->
    <div class="background-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <div class="glass-card">
            
            <div class="header">
                <div class="header-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1>Fake News Detector</h1>
                <p class="subtitle">Advanced Neural Network Architecture</p>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-quote-left input-icon"></i>
                <textarea id="newsInput" placeholder="Paste the news article or claim you want to verify..."></textarea>
            </div>
            
            <button id="checkBtn" onclick="analyzeNews()">
                <span id="btnText">Analyze Article</span>
                <i id="btnIcon" class="fa-solid fa-arrow-right"></i>
                <div id="btnSpinner" class="spinner"></div>
            </button>

            <!-- Results -->
            <div id="resultContainer" class="result-container">
                <div id="resultBox" class="result-box">
                    <div id="resultIcon" class="result-icon">
                        <!-- Icon injected by JS -->
                    </div>
                    <div class="result-text">
                        <span class="result-label">Analysis Result</span>
                        <span id="resultValue" class="result-value">
                            <!-- Value injected by JS -->
                        </span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // UPDATE THIS URL ONCE DEPLOYED TO HUGGING FACE
        const API_URL = "http://127.0.0.1:8000/predict";

        async function analyzeNews() {
            const textInput = document.getElementById('newsInput').value.trim();
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnSpinner = document.getElementById('btnSpinner');
            const checkBtn = document.getElementById('checkBtn');
            const resultContainer = document.getElementById('resultContainer');
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultValue = document.getElementById('resultValue');

            if (!textInput) {
                alert("Please enter an article to analyze.");
                return;
            }

            // Set Loading State
            checkBtn.disabled = true;
            checkBtn.style.opacity = "0.8";
            btnText.textContent = "Analyzing Patterns...";
            btnIcon.style.display = "none";
            btnSpinner.style.display = "block";
            resultContainer.style.display = "none";
            
            // Clean previous classes
            resultBox.classList.remove('real', 'fake');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput })
                });

                const data = await response.json();
                
                // Reset Button State
                resetButtonState();

                if (data.error) {
                    alert("Backend Error: " + data.error);
                    return;
                }

                // Show Results
                resultContainer.style.display = "block";

                if (data.prediction === "Real News") {
                    resultBox.classList.add('real');
                    resultIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                    resultValue.textContent = "Authentic News";
                } else if (data.prediction === "Fake News") {
                    resultBox.classList.add('fake');
                    resultIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
                    resultValue.textContent = "Fake News Detected";
                } else {
                    resultValue.textContent = "Inconclusive";
                }

            } catch (error) {
                console.error("Error calling API:", error);
                resetButtonState();
                alert("Could not connect to the API server. Please make sure the backend is running.");
            }

            function resetButtonState() {
                checkBtn.disabled = false;
                checkBtn.style.opacity = "1";
                btnText.textContent = "Analyze Article";
                btnIcon.style.display = "block";
                btnSpinner.style.display = "none";
            }
        }
    </script>
</body>
</html>
